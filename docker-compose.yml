services:
  parser:
    build:
      context: .
      dockerfile: docker/parser.Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001

  enrichment:
    build:
      context: .
      dockerfile: docker/enrichment.Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DIGIKEY_CLIENT_ID=${DIGIKEY_CLIENT_ID}
      - DIGIKEY_CLIENT_SECRET=${DIGIKEY_CLIENT_SECRET}
      - AWS_REGION=${AWS_REGION:-us-west-2}
      - PARTS_TABLE=${PARTS_TABLE:-prokuro-parts}
      - UNRESOLVED_TABLE=${UNRESOLVED_TABLE:-prokuro-unresolved}
    # Uses the default AWS credential chain (env / profile / IAM).
    # Point PARTS_TABLE / UNRESOLVED_TABLE at the CDK-provisioned tables.

  tariff:
    build:
      context: .
      dockerfile: docker/tariff.Dockerfile
    ports:
      - "3003:3003"
    environment:
      - PORT=3003

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - PARSER_URL=http://parser:3001
      - ENRICHMENT_URL=http://enrichment:3002
      - TARIFF_URL=${TARIFF_URL:-http://tariff:3003}
      - BOM_STORAGE_PATH=/data/boms
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID:-}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID:-}
      - COGNITO_REGION=${COGNITO_REGION:-us-west-2}
      - AWS_REGION=${AWS_REGION:-us-west-2}
    volumes:
      - bom-data:/data/boms
    depends_on:
      - parser
      - enrichment
      - tariff

volumes:
  bom-data:
