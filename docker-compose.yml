services:
  parser:
    build:
      context: .
      dockerfile: docker/parser.Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: prokuro
      POSTGRES_PASSWORD: prokuro
      POSTGRES_DB: prokuro
    volumes:
      - pgdata:/var/lib/postgresql/data

  enrichment:
    build:
      context: .
      dockerfile: docker/enrichment.Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NEXAR_CLIENT_ID=${NEXAR_CLIENT_ID}
      - NEXAR_CLIENT_SECRET=${NEXAR_CLIENT_SECRET}
      - DATABASE_URL=postgres://prokuro:prokuro@postgres:5432/prokuro
    depends_on:
      - postgres

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - PARSER_URL=http://parser:3001
      - ENRICHMENT_URL=http://enrichment:3002
      - BOM_STORAGE_PATH=/data/boms
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID:-}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID:-}
      - COGNITO_REGION=${COGNITO_REGION:-us-west-2}
      - AWS_REGION=${AWS_REGION:-us-west-2}
    volumes:
      - bom-data:/data/boms
    depends_on:
      - parser
      - enrichment

volumes:
  bom-data:
  pgdata:
